<!DOCTYPE html>
<html>

<head>
    <title>OBS Lower Thirds - Veritas</title>
    <style>
        body,
        html { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; 
            background: transparent;
            display: flex;
            flex-direction: column;
        }

        #container {
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #container.visible {
            opacity: 1;
        }

        #title-text {
            width: 100%;
            text-align: center;
            font-weight: 500;
            padding-top: 20px;
            flex-shrink: 0;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0 10px 25px rgba(0, 0, 0, 1);
        }

        #verse-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 0;
            width: 100%;
            position: relative;
        }

        #main-text {
            color: white;
            font-size: 5vw;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0 10px 25px rgba(0, 0, 0, 1);
            line-height: 1.1;
        }

        #sub-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 2vw;
            margin-top: 1vh;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0 10px 25px rgba(0, 0, 0, 1);
        }
        
        video::-webkit-media-controls,
        video::-webkit-media-controls-start-playback-button,
        video::-webkit-media-controls-overlay-play-button {
            display: none !important;
        }
        video {
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="container">
        <div id="title-text"></div>
        <div id="verse-container" style="margin-top: 10px; gap: 1.5vh;">
            <div style="flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; min-height: 0;">
                <div id="main-text" style="width: 100%;"></div>
            </div>
            <div id="sub-wrapper" style="flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; min-height: 0; padding-bottom: 6vh;">
                <div id="sub-text" style="width: 100%;"></div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const titleText = document.getElementById('title-text');
        const mainText = document.getElementById('main-text');
        const subText = document.getElementById('sub-text');

        let ws;function connect() {
            const ws = new WebSocket(`ws://${window.location.host}/ws`);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.isBlackout || !data.text) {
                    container.classList.remove('visible');
                } else {
                    if (data.title) {
                        titleText.textContent = data.title;
                        titleText.style.display = 'block';
                    } else {
                        titleText.style.display = 'none';
                    }

                    mainText.textContent = data.text;
                    if (data.subtext) {
                        subText.textContent = data.subtext;
                        document.getElementById('sub-wrapper').style.display = 'flex';
                    } else {
                        document.getElementById('sub-wrapper').style.display = 'none';
                    }

                    // Apply basic theme stuff if provided
                    if (data.theme) {
                        mainText.style.fontFamily = data.theme.fontFamily || 'serif';
                        mainText.style.color = data.theme.fontColor || 'white';
                        mainText.style.textShadow = data.theme.textShadow || '2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0 10px 25px rgba(0,0,0,1)';
                        mainText.style.fontWeight = data.theme.fontWeight !== undefined ? data.theme.fontWeight : 800;

                        const mSize = data.theme.mainFontSize || 90;
                        const sSize = data.theme.subFontSize || 60;
                        const tSize = 40;

                        titleText.style.fontSize = `${tSize}px`;

                        // Apply same family/shadow to subtext
                        subText.style.fontFamily = data.theme.fontFamily || 'serif';
                        subText.style.textShadow = mainText.style.textShadow;
                        subText.style.fontWeight = mainText.style.fontWeight;
                        // Subtext color is slightly dimmer than main text color
                        subText.style.color = data.theme.fontColor || 'rgba(255, 255, 255, 0.9)';

                        // Apply same to titleText
                        titleText.style.fontFamily = data.theme.fontFamily || 'serif';
                        titleText.style.textShadow = mainText.style.textShadow;
                        titleText.style.fontWeight = mainText.style.fontWeight;
                        titleText.style.color = data.theme.fontColor || 'rgba(255, 255, 255, 0.9)';

                        // Handle background dynamically
                        let bgContainer = document.getElementById('bg-layer');
                        if (!bgContainer) {
                            bgContainer = document.createElement('div');
                            bgContainer.id = 'bg-layer';
                            bgContainer.style.position = 'absolute';
                            bgContainer.style.inset = '0';
                            bgContainer.style.zIndex = '-1';
                            document.body.appendChild(bgContainer);
                        }

                        if (data.theme.bgType === 'video' && data.theme.bgValue) {
                            bgContainer.innerHTML = `<video id="bg-video" src="${data.theme.bgValue}" autoplay loop muted playsinline poster="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="width: 100%; height: 100%; object-fit: cover;"></video>`;
                            setTimeout(() => {
                                const v = document.getElementById('bg-video');
                                if (v) {
                                    v.defaultMuted = true;
                                    v.muted = true;
                                    v.play().catch(e => console.log('Autoplay prevented:', e));
                                }
                            }, 50);
                        } else if (data.theme.bgType === 'image' && data.theme.bgValue) {
                            bgContainer.innerHTML = '';
                            bgContainer.style.backgroundImage = `url(${data.theme.bgValue})`;
                            bgContainer.style.backgroundSize = 'cover';
                        } else if (data.theme.bgType === 'color') {
                            bgContainer.innerHTML = '';
                            bgContainer.style.backgroundImage = 'none';
                            bgContainer.style.backgroundColor = data.theme.bgValue;
                        }

                        // Add overlay for dim and blur if using media
                        let overlayContainer = document.getElementById('bg-overlay');
                        if (!overlayContainer) {
                            overlayContainer = document.createElement('div');
                            overlayContainer.id = 'bg-overlay';
                            overlayContainer.style.position = 'absolute';
                            overlayContainer.style.inset = '0';
                            overlayContainer.style.zIndex = '-1'; // just above bg layer
                            document.body.appendChild(overlayContainer);
                        }

                        if (data.theme.bgType === 'image' || data.theme.bgType === 'video') {
                            const dim = data.theme.bgDim !== undefined ? data.theme.bgDim : 40;
                            const blur = data.theme.bgBlur !== undefined ? data.theme.bgBlur : 2;
                            overlayContainer.style.backgroundColor = `rgba(0, 0, 0, ${dim / 100})`;
                            overlayContainer.style.backdropFilter = `blur(${blur}px)`;
                            overlayContainer.style.display = 'block';
                        } else {
                            overlayContainer.style.display = 'none';
                        }
                        
                        const verseContainer = document.getElementById('verse-container');
                        if (verseContainer) {
                            verseContainer.style.textAlign = data.theme.textAlign || 'center';
                        }
                        mainText.style.textAlign = data.theme.textAlign || 'center';

                        requestAnimationFrame(() => {
                            const mSize = data.theme.mainFontSize ? data.theme.mainFontSize : 60;
                            const sSize = data.theme.subFontSize ? data.theme.subFontSize : 40;
                            
                            function autoScale() {
                                let min = 0.01;
                                let max = 1.0;
                                let best = min;
                                
                                for (let i = 0; i < 15; i++) {
                                    const mid = (min + max) / 2;
                                    mainText.style.fontSize = `${mid * mSize}px`;
                                    if (data.subtext) subText.style.fontSize = `${mid * sSize}px`;

                                    let overflows = false;
                                    
                                    if (mainText.offsetParent !== null) {
                                        const maxHeight = mainText.parentElement.clientHeight * 0.95;
                                        const maxWidth = mainText.parentElement.clientWidth;
                                        if (mainText.scrollHeight > maxHeight || mainText.scrollWidth > maxWidth) overflows = true;
                                    }

                                    if (data.subtext && subText.offsetParent !== null) {
                                        const maxHeight = subText.parentElement.clientHeight * 0.95;
                                        const maxWidth = subText.parentElement.clientWidth;
                                        if (subText.scrollHeight > maxHeight || subText.scrollWidth > maxWidth) overflows = true;
                                    }

                                    if (overflows) {
                                        max = mid;
                                    } else {
                                        best = mid;
                                        min = mid;
                                    }
                                }
                                
                                mainText.style.fontSize = `${best * mSize}px`;
                                if (data.subtext) subText.style.fontSize = `${best * sSize}px`;
                            }
                            
                            autoScale();
                        });
                        container.classList.add('visible');
                    }
                }
            };

            ws.onclose = () => {
                setTimeout(connect, 1000); // Reconnect
            };
        }

        connect();
    </script>
</body>

</html>
